name: E2E smoke (@hedgr/frontend)
on:
  pull_request:
    branches: [ "*" ]

# allow the workflow to write commit statuses
permissions:
  contents: read
  statuses: write
  pull-requests: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_AUTH_MODE: mock
      NEXT_PUBLIC_DEFI_MODE: mock
      NEXT_PUBLIC_FX_MODE: fixed
      NEXT_PUBLIC_APP_ENV: dev
      BACKEND_PORT: "5050"
      NEXT_PUBLIC_API_BASE_URL: http://localhost:5050
      OPENAI_MODE: stub
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # bridge: mark required context as pending at start
      - name: Publish pending commit status (start)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.payload.pull_request?.head.sha ?? context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'pending',
              context: 'E2E smoke (@hedgr/frontend)',
              description: 'E2E job started',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack & install pinned pnpm
        run: |
          corepack enable
          corepack install
          node -v
          pnpm -v

      - name: Compute pnpm store path
        id: pnpm_store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm_store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies (frozen)
        run: pnpm -r install --frozen-lockfile

      - name: Trust check (environment safety)
        run: pnpm -w trust:check

      - name: Typecheck (workspace)
        run: pnpm -w typecheck

      - name: Lint (workspace)
        run: pnpm -w lint

      - name: Unit tests
        run: pnpm -w test

      - name: Build frontend
        run: pnpm --filter @hedgr/frontend run build
        env:
          NEXT_PUBLIC_FX_MODE: stub
          NEXT_PUBLIC_API_BASE_URL: http://localhost:${{ env.BACKEND_PORT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install backend (editable, with test extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/backend[test]"

      - name: Install Playwright
        run: pnpm --filter @hedgr/frontend exec playwright install --with-deps

      - name: Start stub backend (STUB_MODE)
        run: |
          set -euo pipefail
          : > apps/backend/backend.log
          nohup python -m src.app --port "${BACKEND_PORT}" \
            > apps/backend/backend.log 2>&1 &
          echo $! > apps/backend/backend.pid
        env:
          STUB_MODE: "true"
          PORT: ${{ env.BACKEND_PORT }}
          PYTHONUNBUFFERED: "1"

      - name: Wait for backend readiness (/v1/health)
        run: |
          set -euo pipefail
          url="http://localhost:${BACKEND_PORT}/v1/health"
          echo "Polling: $url"
          for i in {1..45}; do
            if curl -fsS "$url" >/dev/null; then
              echo "Backend ready"
              exit 0
            fi
            echo "Not ready yet ($i/45)..." && sleep 1
          done
          echo "Backend failed to become ready in time"
          echo "---- backend.log (tail) ----"
          tail -n 200 apps/backend/backend.log || true
          exit 1

      - name: Run E2E tests
        run: pnpm --filter @hedgr/frontend run e2e:ci
        env:
          NEXT_PUBLIC_FX_MODE: stub
          NEXT_PUBLIC_API_BASE_URL: http://localhost:${{ env.BACKEND_PORT }}

      - name: Upload backend logs (on failure)
        if: ${{ failure() || cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-log
          path: apps/backend/backend.log
          if-no-files-found: warn
          retention-days: 7

      # bridge: set required context to success/failure to satisfy branch protection
      - name: Report E2E status (success)
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.payload.pull_request?.head.sha ?? context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'success',
              context: 'E2E smoke (@hedgr/frontend)',
              description: 'Playwright E2E passed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });

      - name: Report E2E status (failure)
        if: ${{ failure() || cancelled() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.payload.pull_request?.head.sha ?? context.sha;
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha,
              state: 'failure',
              context: 'E2E smoke (@hedgr/frontend)',
              description: 'Playwright E2E failed',
              target_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });